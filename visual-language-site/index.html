    <section class="movement-section" aria-label="Introduction">
      <div class="movement-sticky">
        <div class="type-lines" aria-live="polite">
          <p class="movement-line" data-from="left"  data-text="Bryan Xu is a cross-disciplinary designer interested"></p>
          <p class="movement-line" data-from="left"  data-text="in the space between objects, brands,"></p>
          <p class="movement-line" data-from="left"  data-text="and sensory experiences."></p>

          <p class="movement-line" data-from="left"  data-text="He likes working from tangible things&#8212;"></p>
          <p class="movement-line" data-from="left"  data-text="handles, bottles, light, spaces&#8212;"></p>
          <p class="movement-line" data-from="right" data-text="and then building the stories, atmospheres,"></p>
          <p class="movement-line" data-from="right" data-text="and systems around them."></p>
          <p class="movement-line" data-from="right" data-text="He is drawn to projects that treat design"></p>
          <p class="movement-line" data-from="right" data-text="as both form and cultural framing,"></p>
          <p class="movement-line" data-from="right" data-text="not just surface."></p>
          <p class="movement-line" data-from="right" data-text="Raised in Beijing, he claims to have learned his English"></p>
